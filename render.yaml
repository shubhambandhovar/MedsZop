services:
  - type: web
    name: medszop-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FRONTEND_URL
        value: https://medszop.vercel.app
      - key: FEATURE_DOCTOR_CONSULTATION
        value: "false"
      - key: FEATURE_ADVANCED_ANALYTICS
        value: "false"
      - key: FEATURE_AI_RECOMMENDATIONS
        value: "false"
